services:
  # ─── Web Service (Django + Gunicorn) ────────────────────────────────────────
  - type: web
    name: auron-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 4 --worker-class gthread --max-requests 1000 --timeout 120 --keep-alive 5 --access-logfile - --error-logfile -"
    healthCheckPath: /api/healthz/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      # Las siguientes variables deben setearse manualmente en el dashboard de Render:
      # SECRET_KEY, DATABASE_URL, REDIS_URL, ALLOWED_HOSTS,
      # STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET,
      # CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS, FRONTEND_URL,
      # SENTRY_DSN, SENTRY_ENVIRONMENT, DISABLE_SENTRY,
      # EMAIL_HOST, EMAIL_HOST_PASSWORD, EMAIL_HOST_USER, EMAIL_PORT, EMAIL_USE_TLS,
      # DEFAULT_FROM_EMAIL, FINANCE_ALERT_EMAILS

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: auron-celery-worker
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A backend worker --loglevel=info --concurrency=2 --max-tasks-per-child=100 --time-limit=300 --soft-time-limit=240"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      # Mismas variables de entorno que el web service

  # ─── Celery Beat (scheduler) ────────────────────────────────────────────────
  - type: worker
    name: auron-celery-beat
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      # Mismas variables de entorno que el web service
