events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Security
    server_tokens off;
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;

    server {
        listen 80;
        server_name localhost;
        
        # Rate limiting global
        limit_req zone=api burst=20 nodelay;

        location /static/ {
            alias /code/staticfiles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /media/ {
            alias /code/media/;
            # Prevenir ejecución de scripts
            location ~* \.(php|jsp|asp|sh|py)$ {
                deny all;
            }
        }
        
        # Bloquear /metrics desde internet (solo red interna Docker)
        location /metrics {
            allow 172.16.0.0/12;  # Docker networks
            deny all;
            
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
        }
        
        # Rate limiting estricto para autenticación
        location ~* /api/auth/(login|register)/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Headers de seguridad mejorados
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";
            
            # Solo HSTS en HTTPS
            # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }
    }
}


