events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    client_max_body_size 5m;
    client_body_buffer_size 16k;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security
    server_tokens off;
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;

    server {
        listen 80;
        server_name localhost;
        set $web_upstream http://web:8000;
        set $sse_upstream http://sse:8001;
        
        # Redirect to HTTPS in production (uncomment for production SSL)
        # if ($host != "localhost" -o $http_x_forwarded_proto = "http") {
        #     return 301 https://$host$request_uri;
        # }
        
        # Rate limiting global
        limit_req zone=api burst=20 nodelay;

        location /static/ {
            alias /code/staticfiles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /media/ {
            alias /code/media/;
            disable_symlinks if_not_owner;
            # Prevenir ejecución de scripts
            location ~* \.(php|jsp|asp|sh|py|pl|cgi)$ {
                deny all;
            }
        }
        
        # Bloquear /metrics desde internet (solo red interna Docker)
        location /metrics {
            allow 172.16.0.0/12;  # Docker networks
            deny all;
            
            proxy_pass $web_upstream;
            proxy_set_header Host $host;
        }
        
        # Rate limiting estricto para autenticación
        location ~* /api/auth/(login|register|reset-password)/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass $web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notifications/stream/ {
            proxy_pass $sse_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 120s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_conn conn_limit 20;
            proxy_pass $web_upstream;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Headers de seguridad mejorados
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
            
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }
    }

    # ====================================================================
    # SSL Server Block (HTTPS)
    # Activar en producción: descomentar todo el bloque y asegurar que
    # /etc/letsencrypt esté montado (ya configurado en docker-compose.prod.yml).
