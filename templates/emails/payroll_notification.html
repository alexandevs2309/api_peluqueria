{% extends "emails/base.html" %}
{% block content %}
<p style="margin:0 0 12px;">Hola <strong>{{ user_full_name }}</strong>,</p>
<p style="margin:0 0 12px;">{{ message }}</p>
{% if details %}
<div style="background:#f3f4f6;border-radius:8px;padding:16px;margin:16px 0;font-size:14px;">
  {% for label, value in details %}
  <p style="margin:4px 0;"><strong>{{ label }}:</strong> {{ value }}</p>
  {% endfor %}
</div>
{% endif %}
{% if extra_note %}
<p style="color:#6b7280;font-size:13px;">{{ extra_note }}</p>
{% endif %}
{% endblock %}
