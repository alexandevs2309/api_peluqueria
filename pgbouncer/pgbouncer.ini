[databases]
* = host=db port=5432 dbname=barbershop_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

# Pool settings
pool_mode = transaction
default_pool_size = 25
max_client_conn = 100
max_db_connections = 0
reserve_pool_size = 5
reserve_pool_timeout = 3

# Timeouts
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 600
query_timeout = 30

# Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
