name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  PYTHON_VERSION: 3.13

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-django
    
    - name: Create test environment file
      run: |
        echo "SECRET_KEY=test-secret-key-for-ci" > .env
        echo "DEBUG=True" >> .env
        echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/test_db" >> .env
        echo "REDIS_URL=redis://localhost:6379/0" >> .env
        echo "CELERY_TASK_ALWAYS_EAGER=True" >> .env
    
    - name: Run migrations
      run: |
        python manage.py migrate --no-input
    
    - name: Run tests with coverage
      run: |
        python -m pytest --cov=apps --cov=backend --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Django Security Check
      run: |
        python manage.py check --deploy
    
    - name: Check for missing migrations
      run: |
        python manage.py makemigrations --check --dry-run

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security checks
      uses: pypa/gh-action-pip-audit@v1.0.8
      with:
        inputs: requirements.txt
    
    - name: Run Bandit security linter
      run: |
        pip install bandit
        bandit -r apps/ backend/ -f json -o bandit-report.json || true
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/peluqueria-api:latest
          ${{ secrets.DOCKER_USERNAME }}/peluqueria-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production
    
    steps:
    - name: Trigger Render deploy
      run: |
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
        echo "Render response: $RESPONSE"
        if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
          echo "Deploy hook failed with status $RESPONSE"
          exit 1
        fi
        echo "Deploy triggered"

    - name: Wait for deploy to complete
      run: |
        echo "Waiting 90s for Render to build and start..."
        sleep 90

    - name: Smoke test health check
      run: |
        MAX_RETRIES=10
        RETRY_DELAY=15
        API_URL="${{ secrets.PRODUCTION_API_URL }}"

        for i in $(seq 1 $MAX_RETRIES); do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "${API_URL}/healthz/")
          echo "Attempt $i: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed"
            exit 0
          fi
          sleep $RETRY_DELAY
        done

        echo "Health check failed after $MAX_RETRIES attempts"
        exit 1

    - name: Smoke test API schema
      run: |
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 10 \
          "${{ secrets.PRODUCTION_API_URL }}/schema/")
        if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "403" ]; then
          echo "API schema endpoint reachable (HTTP $HTTP_STATUS)"
        else
          echo "API schema unreachable (HTTP $HTTP_STATUS)"
          exit 1
        fi

    - name: Notify on success
      if: success()
      run: |
        echo "Deploy SUCCESS - $(date -u '+%Y-%m-%d %H:%M UTC')"
        echo "Commit: ${{ github.sha }}"
        echo "Branch: ${{ github.ref_name }}"

    - name: Notify on failure
      if: failure()
      run: |
        echo "Deploy FAILED - manual intervention required"
        echo "Last commit: ${{ github.sha }}"
