version: '3.8'

services:
  # ==========================================
  # BASE DE DATOS POSTGRESQL
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: saas_peluquerias_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/enable_rls.sql:/docker-entrypoint-initdb.d/01_enable_rls.sql:ro
    ports:
      - "127.0.0.1:5432:5432"  # Solo localhost
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # REDIS CACHE Y BROKER
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: saas_peluquerias_redis
    restart: unless-stopped
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Solo localhost
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # APLICACIÓN WEB DJANGO
  # ==========================================
  web:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    container_name: saas_peluquerias_web
    restart: unless-stopped
    command: >
      gunicorn backend.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --worker-class sync
      --worker-connections 1000
      --max-requests 1000
      --max-requests-jitter 100
      --timeout 120
      --keep-alive 5
      --preload
      --access-logfile -
      --error-logfile -
      --log-level info
    volumes:
      - static_volume:/code/staticfiles:ro
      - media_volume:/code/media
      - ./logs:/code/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings_production
    ports:
      - "127.0.0.1:8000:8000"  # Solo localhost, nginx hace proxy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==========================================
  # CELERY WORKER
  # ==========================================
  celery:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    container_name: saas_peluquerias_celery
    restart: unless-stopped
    command: >
      celery -A backend worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=1000
      --time-limit=300
      --soft-time-limit=240
    volumes:
      - ./logs:/code/logs
      - media_volume:/code/media
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings_production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "celery", "-A", "backend", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==========================================
  # CELERY BEAT SCHEDULER
  # ==========================================
  celery-beat:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    container_name: saas_peluquerias_beat
    restart: unless-stopped
    command: >
      celery -A backend beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    volumes:
      - ./logs:/code/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings_production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # NGINX REVERSE PROXY
  # ==========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: saas_peluquerias_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==========================================
  # MONITOR DE CELERY (OPCIONAL)
  # ==========================================
  flower:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    container_name: saas_peluquerias_flower
    restart: unless-stopped
    command: >
      celery -A backend flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
      --url_prefix=flower
    ports:
      - "127.0.0.1:5555:5555"  # Solo localhost
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings_production
    depends_on:
      - redis
      - celery
    networks:
      - backend
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker/volumes/saas_peluquerias_postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker/volumes/saas_peluquerias_redis
  static_volume:
    driver: local
  media_volume:
    driver: local

# ==========================================
# REDES
# ==========================================
networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16